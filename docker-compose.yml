version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: sniper-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  sniper-admin:
    build: .
    container_name: sniper-admin-bot
    environment:
      - REDIS_HOST=redis
      - MASTER_PASSWORD=your_secure_password_here_change_it
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
