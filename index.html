<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر هدايا تليجرام</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #1a1a2e;
            --card: #1e2a3a;
            --text: #ffffff;
            --hint: #8e8e93;
            --primary: #4A90D9;
            --gold: #FFD700;
            --danger: #f44336;
            --success: #4CAF50;
            --border: #2a3a4a;
        }
        
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            margin-bottom: 16px;
        }
        
        .header h1 { font-size: 20px; }
        
        .cart-icon {
            position: relative;
            font-size: 24px;
            cursor: pointer;
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
        }
        
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
        }
        
        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        .product-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .product-card:active { transform: scale(0.98); }
        
        .product-emoji {
            font-size: 50px;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border-radius: 12px;
            flex-shrink: 0;
        }
        
        .product-info { flex: 1; }
        
        .product-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .product-desc {
            font-size: 13px;
            color: var(--hint);
            margin-bottom: 8px;
        }
        
        .price-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .price {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }
        
        .old-price {
            font-size: 14px;
            color: var(--hint);
            text-decoration: line-through;
        }
        
        .discount {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
            width: 100%;
            padding: 16px;
            font-size: 16px;
        }
        
        /* السلة */
        .cart-item {
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }
        
        .qty-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 25px;
            z-index: 1000;
            border: 1px solid var(--border);
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        
        .hidden { display: none !important; }
        
        /* نموذج الدفع */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-content {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎁 متجر الهدايا</h1>
        <div class="cart-icon" onclick="showCart()">
            🛒
            <span class="cart-badge hidden" id="cartBadge">0</span>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="filterProducts('all')">الكل</button>
        <button class="tab" onclick="filterProducts('premium')">💎 بريميوم</button>
        <button class="tab" onclick="filterProducts('stars')">⭐ نجوم</button>
    </div>
    
    <div id="productsContainer"></div>
    
    <!-- السلة -->
    <div id="cartView" class="hidden">
        <h3 style="margin-bottom: 16px;">🛒 سلة التسوق</h3>
        <div id="cartItems"></div>
        <div id="cartSummary" style="margin-top: 16px;"></div>
    </div>
    
    <!-- نافذة الدفع -->
    <div id="paymentModal" class="modal hidden">
        <div class="modal-content">
            <h3 style="margin-bottom: 16px;">💳 اختر طريقة الدفع</h3>
            <div id="paymentMethods"></div>
            <button class="btn btn-outline" style="width:100%; margin-top:12px;" onclick="closePayment()">إلغاء</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // المنتجات (نفس بيانات البوت)
        const products = [
            { id: "premium_1m", name: "تليجرام بريميوم - شهر", category: "premium", price: 4.99, original_price: 6.99, emoji: "💎", desc: "اشتراك شهر كامل" },
            { id: "premium_3m", name: "تليجرام بريميوم - 3 شهور", category: "premium", price: 12.99, original_price: 20.97, emoji: "💎", desc: "وفر 38%" },
            { id: "premium_1y", name: "تليجرام بريميوم - سنة", category: "premium", price: 39.99, original_price: 83.88, emoji: "👑", desc: "أفضل قيمة - وفر 52%" },
            { id: "stars_50", name: "50 نجمة", category: "stars", price: 1.99, original_price: 2.49, emoji: "⭐", desc: "نجوم تليجرام" },
            { id: "stars_100", name: "100 نجمة", category: "stars", price: 3.49, original_price: 4.99, emoji: "⭐", desc: "نجوم تليجرام" },
            { id: "stars_250", name: "250 نجمة", category: "stars", price: 7.99, original_price: 12.49, emoji: "🌟", desc: "نجوم تليجرام" },
            { id: "stars_500", name: "500 نجمة", category: "stars", price: 14.99, original_price: 24.99, emoji: "🌟", desc: "خصم 40%" },
            { id: "stars_1000", name: "1000 نجمة", category: "stars", price: 27.99, original_price: 49.99, emoji: "💫", desc: "أفضل عرض" },
            { id: "stars_2500", name: "2500 نجمة", category: "stars", price: 64.99, original_price: 124.99, emoji: "✨", desc: "أكبر خصم" }
        ];
        
        let cart = [];
        let currentFilter = 'all';
        
        // تحميل السلة من التخزين المحلي
        const savedCart = localStorage.getItem('tg_shop_cart');
        if (savedCart) cart = JSON.parse(savedCart);
        
        function saveCart() {
            localStorage.setItem('tg_shop_cart', JSON.stringify(cart));
            updateCartBadge();
        }
        
        function updateCartBadge() {
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            const badge = document.getElementById('cartBadge');
            badge.textContent = count;
            badge.classList.toggle('hidden', count === 0);
        }
        
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }
        
        function filterProducts(cat) {
            currentFilter = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts();
        }
        
        function renderProducts() {
            const filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
            const container = document.getElementById('productsContainer');
            document.getElementById('cartView').classList.add('hidden');
            container.classList.remove('hidden');
            
            container.innerHTML = filtered.map(p => {
                const discount = Math.round((1 - p.price / p.original_price) * 100);
                return `
                    <div class="product-card" onclick="addToCart('${p.id}')">
                        <div class="product-emoji">${p.emoji}</div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-desc">${p.desc}</div>
                            <div class="price-row">
                                <span class="price">$${p.price}</span>
                                <span class="old-price">$${p.original_price}</span>
                                <span class="discount">-${discount}%</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const existing = cart.find(i => i.id === productId);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            saveCart();
            showToast(`✅ تمت إضافة ${product.name}`);
            
            // إرسال للبوت
            tg.sendData(JSON.stringify({
                action: 'add_to_cart',
                product_id: productId
            }));
        }
        
        function showCart() {
            const container = document.getElementById('productsContainer');
            const cartView = document.getElementById('cartView');
            
            container.classList.add('hidden');
            cartView.classList.remove('hidden');
            
            if (cart.length === 0) {
                cartView.innerHTML = `
                    <h3>🛒 سلة التسوق</h3>
                    <p style="text-align:center; padding:40px; color:var(--hint);">السلة فارغة</p>
                    <button class="btn btn-primary" onclick="filterProducts('all')">تصفح المتجر</button>
                `;
                return;
            }
            
            let html = '<h3>🛒 سلة التسوق</h3>';
            
            cart.forEach((item, index) => {
                html += `
                    <div class="cart-item">
                        <span style="font-size:30px;">${item.emoji}</span>
                        <div style="flex:1;">
                            <div style="font-weight:600;">${item.name}</div>
                            <div style="color:var(--gold);">$${(item.price * item.quantity).toFixed(2)}</div>
                        </div>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                        </div>
                        <button class="btn btn-outline" onclick="removeItem(${index})">🗑️</button>
                    </div>
                `;
            });
            
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            
            html += `
                <div id="cartSummary" style="background:var(--card); border-radius:12px; padding:16px; margin-top:16px; border:1px solid var(--border);">
                    <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:700; color:var(--gold);">
                        <span>الإجمالي:</span>
                        <span>$${total.toFixed(2)}</span>
                    </div>
                </div>
                <button class="btn btn-success" style="margin-top:12px;" onclick="checkout()">
                    💳 إتمام الشراء - $${total.toFixed(2)}
                </button>
                <button class="btn btn-outline" style="width:100%; margin-top:8px;" onclick="filterProducts('all')">
                    متابعة التسوق
                </button>
            `;
            
            cartView.innerHTML = html;
        }
        
        function changeQty(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            saveCart();
            showCart();
        }
        
        function removeItem(index) {
            cart.splice(index, 1);
            saveCart();
            showCart();
        }
        
        function checkout() {
            if (cart.length === 0) {
                showToast('❌ السلة فارغة');
                return;
            }
            
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            
            // إرسال للبوت
            tg.sendData(JSON.stringify({
                action: 'checkout',
                cart: cart,
                total: total
            }));
            
            // عرض طرق الدفع
            const modal = document.getElementById('paymentModal');
            modal.classList.remove('hidden');
            
            document.getElementById('paymentMethods').innerHTML = `
                <p style="margin-bottom:12px;">الإجمالي: <strong style="color:var(--gold);">$${total.toFixed(2)}</strong></p>
                <button class="btn btn-primary" style="width:100%; margin-bottom:8px;" onclick="selectPayment('USDT')">
                    💳 USDT (TRC20)
                </button>
                <button class="btn btn-outline" style="width:100%; margin-bottom:8px;" onclick="selectPayment('Vodafone')">
                    📱 فودافون كاش
                </button>
                <button class="btn btn-outline" style="width:100%;" onclick="selectPayment('BTC')">
                    ₿ بيتكوين
                </button>
            `;
        }
        
        function selectPayment(method) {
            tg.sendData(JSON.stringify({
                action: 'payment_selected',
                method: method,
                cart: cart,
                total: cart.reduce((s, i) => s + (i.price * i.quantity), 0)
            }));
            
            // مسح السلة
            cart = [];
            saveCart();
            
            document.getElementById('paymentModal').classList.add('hidden');
            showToast('✅ جاري المعالجة...');
            
            setTimeout(() => tg.close(), 1500);
        }
        
        function closePayment() {
            document.getElementById('paymentModal').classList.add('hidden');
        }
        
        // بدء التطبيق
        updateCartBadge();
        renderProducts();
    </script>
</body>
</html>
